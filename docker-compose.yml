services:

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://llama-cpp:8080/v1
      - OPENAI_API_KEY=dummy
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=http://whisper:9000/v1
      - AUDIO_STT_OPENAI_API_KEY=dummy
      - AUDIO_STT_MODEL=Systran/faster-whisper-small
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://whisper:9000/v1
      - AUDIO_TTS_OPENAI_API_KEY=dummy
      - AUDIO_TTS_OPENAI_VOICE=martin
      - AUDIO_TTS_MODEL=Godelaune/Kokoro-82M-ONNX-German-Martin
      - ENABLE_API_KEYS=true
    volumes:
      - ./data/open-webui:/app/backend/data
    depends_on:
      - llama-cpp
      - qdrant
      - whisper

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-cpp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    environment:
      - LLAMA_CACHE=/models
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -f /models/active_model.conf ]; then
          . /models/active_model.conf
        fi
        REPO=$${LLAMA_HF_REPO:-bartowski/Qwen_Qwen3-4B-Instruct-2507-GGUF}
        FILE=$${LLAMA_HF_FILE:-Qwen_Qwen3-4B-Instruct-2507-Q4_K_M.gguf}
        if [ -n "$$REPO" ]; then
          exec /app/llama-server --hf-repo "$$REPO" --hf-file "$$FILE" --host 0.0.0.0 --port 8080 --ctx-size 4096
        else
          exec /app/llama-server -m "/models/$$FILE" --host 0.0.0.0 --port 8080 --ctx-size 4096
        fi

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  whisper:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: whisper
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./data/whisper:/home/ubuntu/.cache/huggingface/hub
      - ./data/whisper/patched_utils.py:/home/ubuntu/speaches/src/speaches/executors/kokoro/utils.py:ro
    environment:
      - WHISPER__COMPUTE_TYPE=int8
      - WHISPER__INFERENCE_DEVICE=cpu
      - CHAT_COMPLETION_BASE_URL=http://llama-cpp:8080/v1
      - PRELOAD_MODELS=["Systran/faster-whisper-small", "speaches-ai/Kokoro-82M-v1.0-ONNX", "Godelaune/Kokoro-82M-ONNX-German-Martin"]
      - HF_HUB_DISABLE_SYMLINKS=1
    command: uvicorn --factory speaches.main:create_app --host 0.0.0.0 --port 9000

  dashboard:
    image: python:3.11-slim
    container_name: dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace/dashboard
    command: python server.py

  mysql:
    image: mysql:8.0.39
    container_name: mysql
    env_file: .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
    command:
      --max_connections=1000
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --tls_version="TLSv1.2,TLSv1.3"
      --init-file /data/application/init.sql
      --binlog_expire_logs_seconds=604800
    ports:
      - ${EXPOSE_MYSQL_PORT}:3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./ragflow/docker/init.sql:/data/application/init.sql
    networks:
      default:
        aliases:
          - mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  minio:
    image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z
    container_name: minio
    command: ["server", "--console-address", ":9001", "/data"]
    ports:
      - ${MINIO_PORT}:9000
      - ${MINIO_CONSOLE_PORT}:9001
    env_file: .env
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      default:
        aliases:
          - minio
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 120

  redis:
    image: valkey/valkey:8
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    env_file: .env
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - redis_data:/data
    networks:
      default:
        aliases:
          - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 120

  infinity:
    image: infiniflow/infinity:v0.7.0
    container_name: infinity
    volumes:
      - infinity_data:/var/infinity
      - ./ragflow/docker/infinity_conf.toml:/infinity_conf.toml
    command: ["-f", "/infinity_conf.toml"]
    ports:
      - ${INFINITY_THRIFT_PORT}:23817
      - ${INFINITY_HTTP_PORT}:23820
      - ${INFINITY_PSQL_PORT}:5432
    env_file: .env
    mem_limit: ${MEM_LIMIT}
    ulimits:
      nofile:
        soft: 500000
        hard: 500000
    networks:
      default:
        aliases:
          - infinity
    healthcheck:
      test: ["CMD", "curl", "http://localhost:23820/admin/node/current"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  ragflow:
    image: ${RAGFLOW_IMAGE}
    container_name: ragflow
    depends_on:
      mysql:
        condition: service_healthy
    command:
      - --enable-adminserver
    ports:
      - ${SVR_WEB_HTTP_PORT}:80
      - ${SVR_WEB_HTTPS_PORT}:443
      - ${SVR_HTTP_PORT}:9380
      - ${ADMIN_SVR_HTTP_PORT}:9381
      - ${SVR_MCP_PORT}:9382
      - ${GO_HTTP_PORT}:9384
      - ${GO_ADMIN_PORT}:9383
    volumes:
      - ./ragflow/docker/ragflow-logs:/ragflow/logs
      - ./ragflow/docker/service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template
      - ./ragflow/docker/entrypoint.sh:/ragflow/entrypoint.sh
    env_file: .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_data:
  infinity_data:
  minio_data:
  redis_data:
